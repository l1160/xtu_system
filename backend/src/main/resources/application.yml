spring:
  application:
    name: xtu-system-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/xtu_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 0
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      schema-locations:
        - classpath:/db/migration/V1__init_auth_module.sql

server:
  port: ${SERVER_PORT:8080}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

security:
  jwt:
    secret: ${JWT_SECRET:XTUIntegratedInformationSystemJwtSecretKey2026SpringBoot}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:4173,http://localhost:4173}
